schema {
  query: Query
}

type Query {
  fooBarGet(): EntryCollection
  barFind(foo: String): EntryCollection
  fooBazGet(year: String): EntryCollection
}

type EntryCollection {
    entry: [Entry]
}


type Entry {
    id: Int
    userId: Int
    title: String
    date: String
}


type EntryMessage {
    success: Boolean
    message: String
}


type EntryCreate {
    id: Int
    userId: Int
    title: String
    date: String
}

